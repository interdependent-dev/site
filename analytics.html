<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader Analytics — INTERDEPENDENT</title>
<meta name="robots" content="noindex">
<style>
  :root { --red:#ff0000; --bg:#0a0a0a; --card:#101010; --line:#222; --muted:#888; --txt:#e8e8e8; --green:#16a34a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:'Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased; }
  a { color:#bbb; text-decoration:none; }
  .top { border-bottom:1px solid var(--line); }
  .top-in { max-width:1080px; margin:0 auto; padding:20px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .brand { font-size:13px; letter-spacing:.34em; text-transform:uppercase; font-weight:700; }
  .brand .dot { color:var(--red); }
  .eyebrow { font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); }
  .top-in .sp { margin-left:auto; display:flex; gap:8px; align-items:center; }
  select, .lnk { background:#161616; border:1px solid var(--line); color:#ccc; padding:7px 12px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; border-radius:3px; cursor:pointer; }
  .wrap { max-width:1080px; margin:0 auto; padding:26px 24px 90px; }
  .state { text-align:center; color:var(--muted); padding:80px 0; font-size:14px; }
  h2 { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:40px 0 14px; font-weight:600; }
  h2 .hint { color:#555; letter-spacing:.04em; text-transform:none; font-size:11px; margin-left:8px; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:4px; padding:16px 18px; }
  .card.clk { cursor:pointer; transition:border-color .15s; } .card.clk:hover { border-color:#3a3a3a; }
  .card .n { font-size:30px; font-weight:700; line-height:1; }
  .card .l { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:8px; }

  .funnel { display:grid; gap:8px; max-width:680px; }
  .frow { display:grid; grid-template-columns:130px 1fr 64px; align-items:center; gap:12px; }
  .frow .fl { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#bbb; }
  .ftrack { height:24px; background:#161616; border-radius:3px; overflow:hidden; }
  .ffill { height:100%; background:var(--red); }
  .frow .fv { font-size:13px; text-align:right; color:#ddd; }

  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:9px 10px; font-size:13px; border-bottom:1px solid #181818; }
  th { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { color:#fff; }
  td.num, th.num { text-align:right; }
  tbody tr.clk { cursor:pointer; } tbody tr.clk:hover { background:#141414; }
  .depthbar { display:inline-block; width:46px; height:6px; background:#1c1c1c; border-radius:3px; overflow:hidden; vertical-align:middle; margin-left:8px; }
  .depthbar span { display:block; height:100%; background:var(--red); }
  .muted { color:var(--muted); }
  .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
  .pill.g { background:#0f2a17; color:#3ec46a; } .pill.r { background:#2a0f0f; color:#ff6b6b; } .pill.m { background:#191919; color:#999; }
  .arrow { color:#444; }

  .chart { display:flex; align-items:flex-end; gap:3px; height:140px; border-bottom:1px solid var(--line); padding-bottom:2px; overflow-x:auto; }
  .bar { flex:1; min-width:6px; background:#1e1e1e; position:relative; }
  .bar .r { position:absolute; bottom:0; left:0; right:0; background:var(--red); }
  .bar .c { position:absolute; bottom:0; left:0; right:0; background:var(--green); opacity:.85; }
  .chart-x { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:6px; }
  .legend { display:flex; gap:16px; font-size:11px; color:var(--muted); margin-top:10px; }
  .legend i { display:inline-block; width:10px; height:10px; margin-right:5px; vertical-align:middle; }

  /* drill-down drawer */
  .scrim { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:80; opacity:0; pointer-events:none; transition:opacity .2s; }
  .scrim.open { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(560px,94vw); background:#0c0c0c; border-left:1px solid var(--line); z-index:81;
    transform:translateX(100%); transition:transform .24s ease; overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .dh { display:flex; align-items:flex-start; gap:12px; padding:22px 24px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; background:#0c0c0c; }
  .dh-title { font-size:19px; font-weight:700; line-height:1.2; }
  .dh-x { margin-left:auto; background:none; border:1px solid var(--line); color:#ccc; width:32px; height:32px; cursor:pointer; font-size:16px; flex-shrink:0; }
  .dh-x:hover { border-color:#fff; color:#fff; }
  .dbody { padding:8px 24px 60px; }
  .dstats { display:grid; grid-template-columns:repeat(auto-fit,minmax(82px,1fr)); gap:8px; margin:16px 0 6px; }
  .dstat { background:#131313; border:1px solid var(--line); border-radius:4px; padding:11px 12px; }
  .dstat .n { font-size:20px; font-weight:700; } .dstat .l { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .dh3 { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:26px 0 10px; }
  .rrow { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #161616; font-size:13px; }
  .rrow .rn { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rrow .rd { width:70px; color:var(--muted); font-size:12px; text-align:right; }
  .tl { font-size:12px; color:#aaa; }
  .tl .te { display:flex; gap:8px; padding:5px 0; border-bottom:1px solid #141414; }
  .tl .tt { color:#666; width:90px; flex-shrink:0; }
  .empty { color:#555; font-size:12px; padding:8px 0; }
  .fb-i { padding:11px 0; border-bottom:1px solid #161616; }
  .fb-h { display:flex; align-items:center; gap:8px; }
  .fb-h .rn { flex:1; font-size:13px; color:#ddd; }
  .fb-d { font-size:11px; color:var(--muted); margin:5px 0; letter-spacing:.02em; }
  .fb-n { font-size:12.5px; color:#cfcfcf; line-height:1.6; margin-top:5px; }
  .cal { background:#0e0e0e; border:1px solid var(--line); border-radius:4px; padding:14px 16px; }
  .cal-rates { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .cal-rates b { color:#ddd; font-weight:700; } .cal-rates b.hi { color:var(--red); }
  .cal-lbl { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:12px 0 4px; }
  .btn-recal { width:100%; background:#161616; border:1px solid var(--red); color:#fff; padding:12px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
  .btn-recal:hover:not(:disabled) { background:#1a0606; } .btn-recal:disabled { opacity:.5; cursor:default; }
  @media (max-width:560px){ .dh-title{font-size:16px;} }
</style>
</head>
<body>
  <div class="top"><div class="top-in">
    <span class="brand">INTERDEPENDENT<span class="dot">.</span></span>
    <span class="eyebrow">Reader Analytics</span>
    <span class="sp">
      <select id="days"><option value="30">Last 30 days</option><option value="90" selected>Last 90 days</option><option value="365">Last year</option></select>
      <a class="lnk" href="/submissions.html">← Portal</a>
    </span>
  </div></div>
  <div class="wrap"><div id="content"><div class="state">Loading analytics…</div></div></div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"><div id="drawerBody"></div></aside>

<script>
const API = 'https://interdependent-api.onrender.com';
function token() {
  const t = localStorage.getItem('session_token');
  const e = parseInt(localStorage.getItem('session_expires') || '0', 10);
  if (!t || Date.now() > e) { window.location.href = '/passcode'; return null; }
  return t;
}
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (a, b) => (b ? Math.round(100 * a / b) : 0);
function ago(iso) {
  if (!iso) return '';
  const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago'; if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}
const EVENT_LABEL = { recommend_open:'Opened recommendation', script_view:'Viewed script', reader_open:'Opened reader', read_progress:'Read progress', read_complete:'Reached end', quick_preview:'Quick preview', new_tab:'Opened in new tab', download:'Downloaded', champion:'Championed', browse_unlock:'Unlocked portal' };
const fmtTime = (s) => { s = Math.round(s||0); if (s < 60) return s + 's'; const m = Math.floor(s/60), r = s%60; return r ? `${m}m ${r}s` : `${m}m`; };
const VERDICT = { finished:'<span class="pill g">Read</span>', engaged:'<span class="pill g">Engaged</span>', skimmed:'<span class="pill r">Skimmed</span>', opened:'<span class="pill m">Opened</span>' };

let DATA = null, sortKey = 'opens', sortDir = -1;
const card = (n, l) => `<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`;

function funnelRow(label, val, total) {
  const p = pct(val, total);
  return `<div class="frow"><span class="fl">${label}</span><div class="ftrack"><div class="ffill" style="width:${p}%"></div></div><span class="fv">${val} <span class="muted">${total ? p + '%' : ''}</span></span></div>`;
}

function scoreboard(rows) {
  const cols = [['title','Script',false],['opens','Opens',true],['uniqueReaders','Readers',true],['reachedAvg','Reached',true],['avgSeconds','Avg time',true],['finished','Read',true],['champions','Champions',true],['recommends','Rec’d',true]];
  if (!cols.some(c => c[0] === sortKey)) sortKey = 'opens';
  const sorted = rows.slice().sort((a, b) => { const x=a[sortKey], y=b[sortKey]; if (typeof x === 'string') return sortDir*String(x).localeCompare(String(y)); return sortDir*((x||0)-(y||0)); }).slice(0, 80);
  const head = cols.map(([k,l,num]) => `<th class="${num?'num':''}" data-k="${k}">${l}${sortKey===k?(sortDir<0?' ▾':' ▴'):''}</th>`).join('');
  const body = sorted.map(r => `<tr class="clk" data-id="${r.script_id}" data-title="${esc(r.title)}">
    <td>${esc(r.title)} <span class="arrow">›</span></td>
    <td class="num">${r.opens}</td><td class="num">${r.uniqueReaders}</td>
    <td class="num">${r.reachedAvg}%<span class="depthbar"><span style="width:${r.reachedAvg}%"></span></span></td>
    <td class="num">${r.avgSeconds ? fmtTime(r.avgSeconds) : '<span class="muted">—</span>'}</td>
    <td class="num">${r.finished ? `<span class="pill g">${r.finished}</span>` : '<span class="muted">0</span>'}</td>
    <td class="num">${r.champions ? `<span class="pill g">${r.champions}</span>` : '<span class="muted">0</span>'}</td>
    <td class="num">${r.recommends || '<span class="muted">0</span>'}</td></tr>`).join('');
  return `<table><thead><tr>${head}</tr></thead><tbody>${body || '<tr><td colspan="8" class="muted" style="padding:24px 0">No reads recorded yet.</td></tr>'}</tbody></table>`;
}

function chart(days) {
  if (!days.length) return '<div class="muted" style="padding:20px 0">No activity yet.</div>';
  const max = Math.max(1, ...days.map(d => d.reads + d.champions));
  const bars = days.map(d => `<div class="bar" title="${d.day}: ${d.reads} reads, ${d.champions} champions, ${d.recommends} rec-opens" style="height:${Math.max(3,((d.reads+d.champions)/max)*130)}px"><div class="r" style="height:${(d.reads/max)*130}px"></div><div class="c" style="height:${(d.champions/max)*130}px"></div></div>`).join('');
  return `<div class="chart">${bars}</div><div class="chart-x"><span>${days[0].day}</span><span>${days[days.length-1].day}</span></div><div class="legend"><span><i style="background:#ff0000"></i>Reads</span><span><i style="background:#16a34a"></i>Champions</span></div>`;
}

function render(d) {
  DATA = d;
  const t = d.totals, f = d.recommendFunnel;
  const recTable = d.byRecommender.length ? `<table><thead><tr><th>Recommender</th><th class="num">Sent</th><th class="num">Opened</th><th class="num">Engaged</th><th class="num">Read</th></tr></thead><tbody>${
    d.byRecommender.map(r => `<tr><td>${esc(r.recommender)}</td><td class="num">${r.sent}</td><td class="num">${r.opened} <span class="muted">${pct(r.opened,r.sent)}%</span></td><td class="num">${r.engaged}</td><td class="num">${r.finished}</td></tr>`).join('')
  }</tbody></table>` : '<div class="empty">No recommendation links opened yet.</div>';

  const champTable = d.champions.length ? `<table><thead><tr><th>Script</th><th>Championed by</th><th class="num">When</th></tr></thead><tbody>${
    d.champions.map(c => `<tr class="clk" data-id="${c.script_id}" data-title="${esc(c.title)}"><td>${esc(c.title)} <span class="arrow">›</span></td><td>${esc(c.reader)}</td><td class="num muted">${ago(c.addedAt)}</td></tr>`).join('')
  }</tbody></table>` : '<div class="empty">No champions yet.</div>';

  const readerTable = d.readers.length ? `<table><thead><tr><th>Reader</th><th class="num">Championed</th><th class="num">Scripts read</th></tr></thead><tbody>${
    d.readers.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${r.championed||'<span class="muted">0</span>'}</td><td class="num">${r.scriptsRead||'<span class="muted">0</span>'}</td></tr>`).join('')
  }</tbody></table>` : '<div class="empty">No identified readers yet.</div>';

  document.getElementById('content').innerHTML = `
    <h2>Overview</h2>
    <div class="cards">
      ${card(t.uniqueReaders,'Unique readers')}
      ${card(t.scriptViews,'Script views')}
      ${card(t.readerOpens,'Reader opens')}
      ${card(t.finishedReads,'Reads (depth + time)')}
      <div class="card clk" data-jump="champions"><div class="n">${t.champions}</div><div class="l">Champions ›</div></div>
      ${card(t.recommendOpens,'Recommend opens')}
    </div>

    <h2>Recommendation funnel — did recommendations land? <span class="hint">"Read" = reached the end AND spent real time</span></h2>
    <div class="funnel">
      ${funnelRow('Recommended', f.total, f.total)}${funnelRow('Opened', f.opened, f.total)}${funnelRow('Reached 25%+', f.read25, f.total)}
      ${funnelRow('Reached 75%+', f.read75, f.total)}${funnelRow('Engaged', f.engaged, f.total)}${funnelRow('Read', f.finished, f.total)}
    </div>

    <h2>By recommender</h2>${recTable}
    <h2 id="champions">Champions <span class="hint">click a row for the full story</span></h2>${champTable}
    <h2>Readers</h2>${readerTable}
    <h2>Per-script engagement <span class="hint">click a script to drill in</span></h2><div id="board">${scoreboard(d.perScript)}</div>
    <h2>Activity over time</h2>${chart(d.overTime)}`;

  bindSort();
  document.querySelectorAll('tr.clk').forEach(tr => tr.addEventListener('click', () => openScript(tr.dataset.id, tr.dataset.title)));
  document.querySelectorAll('[data-jump]').forEach(el => el.addEventListener('click', () => { const t = document.getElementById(el.dataset.jump); if (t) t.scrollIntoView({ behavior:'smooth' }); }));
}
function bindSort() {
  document.querySelectorAll('#board th[data-k]').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.k; if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
    document.getElementById('board').innerHTML = scoreboard(DATA.perScript);
    bindSort();
    document.querySelectorAll('#board tr.clk').forEach(tr => tr.addEventListener('click', () => openScript(tr.dataset.id, tr.dataset.title)));
  }));
}

// ── per-script drill-down drawer ──
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('scrim').classList.remove('open'); }
document.getElementById('scrim').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

async function openScript(id, title) {
  if (!id) return;
  const drawer = document.getElementById('drawer'), body = document.getElementById('drawerBody');
  document.getElementById('scrim').classList.add('open'); drawer.classList.add('open'); drawer.scrollTop = 0;
  body.innerHTML = `<div class="dh"><div class="dh-title">${esc(title||'')}</div><button class="dh-x" id="dx">×</button></div><div class="dbody"><div class="empty">Loading…</div></div>`;
  document.getElementById('dx').addEventListener('click', closeDrawer);
  try {
    const t = token(); if (!t) return;
    const H = { Authorization: `Bearer ${t}` };
    const [det, fb] = await Promise.all([
      fetch(`${API}/analytics/script/${encodeURIComponent(id)}`, { headers: H }).then(r => r.ok ? r.json() : null),
      fetch(`${API}/feedback/${encodeURIComponent(id)}`, { headers: H }).then(r => r.ok ? r.json() : { feedback: [], calibration: null }),
    ]);
    if (!det) throw new Error('load');
    renderDetail(det, id, fb);
  } catch {
    document.querySelector('#drawerBody .dbody').innerHTML = '<div class="empty">Couldn’t load details.</div>';
  }
}
const DIMNAME = { distinctiveness:'Distinctiveness', writers_voice:"Voice", memorability:'Memorability', genre_competence:'Genre' };
const VLABEL = { would_champion:['Would champion','g'], maybe:['Maybe','m'], would_not:['Would not','r'] };

function feedbackHtml(fb, id) {
  const items = fb.feedback.map(f => {
    const v = VLABEL[f.championVerdict];
    const dims = f.dimensions && Object.keys(f.dimensions).length ? `<div class="fb-d">${Object.entries(f.dimensions).map(([k,val])=>`${DIMNAME[k]||k} ${val}/5`).join(' · ')}</div>` : '';
    return `<div class="fb-i">
      <div class="fb-h"><span class="rn">${esc(f.reader)}</span>${v?`<span class="pill ${v[1]}">${v[0]}</span>`:''}<span class="rd">${ago(f.createdAt)}</span></div>
      ${dims}
      ${f.text?`<div class="fb-n">${esc(f.text)}</div>`:''}
      ${f.transcript && f.transcript!==f.text?`<div class="fb-n muted">🎙 "${esc(f.transcript)}"</div>`:''}
      ${f.audioUrl?`<audio controls preload="none" src="${esc(f.audioUrl)}" style="width:100%;height:34px;margin-top:6px"></audio>`:''}
    </div>`;
  }).join('') || '<div class="empty">No reader feedback yet.</div>';
  const c = fb.calibration;
  let cal;
  if (c) {
    const ch = c.championability || {};
    cal = `<div class="cal">
      <div class="cal-rates"><span>AI <b class="muted">${esc(ch.ai_rating||'—')}</b></span><span class="arrow">→</span><span>Readers <b>${esc(ch.reader_rating||'—')}</b></span><span class="arrow">→</span><span>Calibrated <b class="hi">${esc(ch.calibrated_rating||'—')}</b></span></div>
      ${ch.justification?`<div class="fb-n">${esc(ch.justification)}</div>`:''}
      ${c.divergence?`<div class="cal-lbl">Where AI & readers diverged</div><div class="fb-n">${esc(c.divergence)}</div>`:''}
      ${c.summary?`<div class="fb-n" style="color:#cfcfcf">${esc(c.summary)}</div>`:''}
      <div class="muted" style="font-size:10px;margin-top:8px">From ${c.readerCount||fb.feedback.length} reader${(c.readerCount||fb.feedback.length)===1?'':'s'} · ${ago(c.calibratedAt)} · <a href="#" id="recalAgain">re-run</a></div>
    </div>`;
  } else if (fb.feedback.length) {
    cal = `<button class="btn-recal" id="recalBtn">⟳ Re-calibrate evaluation with this feedback</button>`;
  } else {
    cal = '<div class="empty">A calibration appears here once readers leave feedback.</div>';
  }
  return `<div class="dh3">Reader feedback (${fb.feedback.length})</div>${items}
    <div class="dh3">AI ↔ reader calibration <span class="muted" style="text-transform:none;letter-spacing:0">— championability</span></div>${cal}`;
}
function wireRecal(id) {
  const run = async (btnId) => {
    const btn = document.getElementById(btnId); if (btn) { btn.textContent = 'Re-calibrating…'; if (btn.tagName==='BUTTON') btn.disabled = true; }
    try {
      const t = token();
      const res = await fetch(`${API}/feedback/${encodeURIComponent(id)}/recalibrate`, { method:'POST', headers:{ Authorization:`Bearer ${t}` } });
      if (!res.ok) throw new Error();
      openScript(id, document.querySelector('.dh-title')?.textContent || ''); // reload drawer with new calibration
    } catch { const b = document.getElementById(btnId); if (b) { b.textContent = '⟳ Re-calibrate evaluation with this feedback'; b.disabled = false; } }
  };
  const rb = document.getElementById('recalBtn'); if (rb) rb.addEventListener('click', () => run('recalBtn'));
  const ra = document.getElementById('recalAgain'); if (ra) ra.addEventListener('click', (e) => { e.preventDefault(); run('recalAgain'); });
}

function renderDetail(d, id, fb) {
  fb = fb || { feedback: [], calibration: null };
  const s = d.summary;
  const readers = d.readers.length ? d.readers.map(r => `<div class="rrow">
      <span class="rn">${esc(r.name)}${r.recommender ? ` <span class="muted">· via ${esc(r.recommender)}</span>` : ''}</span>
      ${VERDICT[r.verdict] || ''}
      <span class="muted" style="font-size:11px;width:78px;text-align:right">${r.depth}% · ${fmtTime(r.seconds)}</span>
      <span class="depthbar"><span style="width:${r.depth}%"></span></span>
      <span class="rd">${ago(r.last)}</span></div>`).join('') : '<div class="empty">No reads recorded.</div>';
  const champs = d.champions.length ? d.champions.map(c => `<div class="rrow"><span class="rn">${esc(c.reader)}</span><span class="rd">${ago(c.addedAt)}</span></div>`).join('') : '<div class="empty">Not championed yet.</div>';
  const recs = d.recommenders.length ? `<table><thead><tr><th>By</th><th class="num">Sent</th><th class="num">Opened</th><th class="num">Engaged</th><th class="num">Read</th></tr></thead><tbody>${
    d.recommenders.map(r => `<tr><td>${esc(r.recommender)}</td><td class="num">${r.sent}</td><td class="num">${r.opened}</td><td class="num">${r.engaged}</td><td class="num">${r.finished}</td></tr>`).join('')}</tbody></table>` : '<div class="empty">Not recommended through the platform yet.</div>';
  const timeline = d.timeline.length ? `<div class="tl">${d.timeline.map(e => `<div class="te"><span class="tt">${ago(e.ts)}</span><span>${EVENT_LABEL[e.type]||e.type}${e.depth!=null?` (${Math.round(e.depth)}%${e.seconds?', '+fmtTime(e.seconds):''})`:''} <span class="muted">— ${esc(e.who)}</span></span></div>`).join('')}</div>` : '<div class="empty">No events.</div>';

  document.querySelector('#drawerBody .dbody').innerHTML = `
    <div class="dstats">
      <div class="dstat"><div class="n">${s.sessions}</div><div class="l">Readers</div></div>
      <div class="dstat"><div class="n">${s.avgDepth}%</div><div class="l">Avg reached</div></div>
      <div class="dstat"><div class="n">${fmtTime(s.avgSeconds)}</div><div class="l">Avg time</div></div>
      <div class="dstat"><div class="n">${s.engaged}</div><div class="l">Engaged</div></div>
      <div class="dstat"><div class="n">${s.finished}</div><div class="l">Read</div></div>
    </div>
    <a class="lnk" style="display:inline-block;margin-top:6px" href="/submissions.html?rec=${encodeURIComponent(id)}" target="_blank">Open script ↗</a>
    <div class="dh3">Who read it</div>${readers}
    <div class="dh3">Champions</div>${champs}
    <div class="dh3">Recommended through the platform</div>${recs}
    ${feedbackHtml(fb, id)}
    <div class="dh3">Recent activity</div>${timeline}`;
  wireRecal(id);
}

async function load() {
  const t = token(); if (!t) return;
  document.getElementById('content').innerHTML = '<div class="state">Loading analytics…</div>';
  try {
    const res = await fetch(`${API}/analytics/summary?days=${document.getElementById('days').value}`, { headers: { Authorization: `Bearer ${t}` } });
    if (res.status === 401) { window.location.href = '/passcode'; return; }
    if (!res.ok) throw new Error('load');
    render(await res.json());
  } catch { document.getElementById('content').innerHTML = '<div class="state">Couldn’t load analytics — try again.</div>'; }
}
document.getElementById('days').addEventListener('change', load);
load();
</script>
</body>
