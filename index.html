<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERDEPENDENT</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            color: #FF0000; /* Dramatic Red */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 5rem); /* Responsive size */
            font-weight: 900;
            letter-spacing: 0.4em; /* The "spaced out" look */
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        p {
            color: #ffffff; /* White tagline */
            font-size: clamp(1rem, 3vw, 1.5rem);
            letter-spacing: 0.1em;
            font-weight: 300;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>I N T E R D E P E N D E N T</h1>
        <p>Coming March 20</p>
    </div>
</body>
</html>
