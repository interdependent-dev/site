<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERDEPENDENT</title>
    <style>
        /* 1. LOAD YOUR CUSTOM FONTS */
        @font-face {
            font-family: 'EurostileCustom';
            src: url('fonts/EurostileNextProBold.woff2') format('woff2');
            font-weight: 900;
        }
        @font-face {
            font-family: 'EurostileCustom';
            src: url('fonts/EurostileNextProRegular.woff2') format('woff2');
            font-weight: 400;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; 
            font-family: 'EurostileCustom', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 92%; /* Breathing room for the edges */
            max-width: 1600px;
            animation: fadeIn 2s ease-in-out forwards;
        }

        h1 {
            color: #FF0000;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            
            /* FORCES TEXT TO ONE LINE */
            white-space: nowrap; 
            
            /* VIEWPORT UNITS: 5.8% of screen width keeps it perfectly fitted */
            font-size: 5.8vw; 
            
            letter-spacing: 0.35em;
            margin-right: -0.35em; /* Perfectly centers the spaced-out text */
        }

        p {
            color: #ffffff;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-top: 25px;
            font-size: clamp(0.6rem, 1.2vw, 0.9rem); 
            opacity: 0.7;
        }

        @keyframes fadeIn {
            0% { opacity: 0; filter: blur(5px); }
            100% { opacity: 1; filter: blur(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>I N T E R D E P E N D E N T</h1>
        <p>Coming March 20</p>
    </div>
</body>
</html>
