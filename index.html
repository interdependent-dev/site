<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERDEPENDENT</title>
    <style>
        /* 1. OPTIMIZED FONT LOADING */
        @font-face {
            font-family: 'EurostileCustom';
            src: url('fonts/EurostileNextProBold.woff2') format('woff2');
            font-weight: 900;
            font-display: swap; /* Speeds up initial text appearance */
        }
        @font-face {
            font-family: 'EurostileCustom';
            src: url('fonts/EurostileNextProRegular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            font-family: 'EurostileCustom', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 5%; /* Side safety margins */
            box-sizing: border-box;
            animation: fadeIn 1.2s ease-out forwards; /* Faster animation for speed */
        }

        h1 {
            color: #FF0000;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            padding: 0;
            
            /* THE FIX FOR CUTTING OFF: */
            width: 100%;
            text-align: center;
            white-space: nowrap; 
            /* Smaller scaling factor (5.2vw) ensures it fits even on the thinnest phones */
            font-size: 5.2vw; 
            letter-spacing: 0.35em;
            margin-right: -0.35em; /* Counter-centers the letter spacing */
        }

        p {
            color: #ffffff;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-top: 2vh; /* Relative to screen height */
            font-size: clamp(0.6rem, 1vw, 0.8rem); 
            opacity: 0.6;
        }

        /* Lightning-fast fade-in with no blur to improve perceived speed */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* MOBILE OVERRIDE: If the screen is vertical, shrink the font even more */
        @media (max-aspect-ratio: 1/1) {
            h1 {
                font-size: 7.5vw; /* Slightly larger for readability, but still one-line */
                letter-spacing: 0.2em; /* Tighter spacing for vertical screens */
                margin-right: -0.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>I N T E R D E P E N D E N T</h1>
        <p>Coming March 20</p>
    </div>
</body>
</html>
