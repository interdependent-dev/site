<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERDEPENDENT</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            /* Fills 90% of the screen width to maximize brand impact */
            width: 90vw; 
            max-width: 1400px;
            display: flex;
            justify-content: center;
        }

        .logo {
            width: 100%;
            height: auto;
            /* Ensures a smooth load */
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.svg" alt="INTERDEPENDENT" class="logo">
    </div>
</body>
</html>
