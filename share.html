<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenplay Recommendation — INTERDEPENDENT</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="A screenplay recommendation from INTERDEPENDENT">
<meta property="og:description" content="An evaluated screenplay, recommended for your consideration.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root { --red:#ff0000; --bg:#0a0a0a; --card:#101010; --line:#222; --muted:#888; --txt:#e8e8e8; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:'Helvetica Neue',Arial,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
  a { color:#bbb; }
  .wrap { max-width:760px; margin:0 auto; padding:0 22px 80px; }
  .topbar { border-bottom:1px solid var(--line); margin-bottom:30px; }
  .topbar-inner { max-width:760px; margin:0 auto; padding:20px 22px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .brand { font-size:13px; letter-spacing:.34em; text-transform:uppercase; font-weight:700; }
  .brand .dot { color:var(--red); }
  .eyebrow { font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-left:auto; }
  .state { text-align:center; color:var(--muted); padding:80px 0; font-size:14px; letter-spacing:.04em; }

  .recby { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
  .recby b { color:var(--red); }
  .accent { width:42px; height:4px; background:var(--red); margin-bottom:18px; }
  h1.title { font-size:34px; line-height:1.12; margin:0 0 14px; font-weight:700; letter-spacing:-.01em; }
  .meta { display:flex; flex-wrap:wrap; gap:8px 22px; color:var(--muted); font-size:12px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:24px; }
  .meta b { color:var(--txt); font-weight:600; }
  .verdict { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
  .badge { display:inline-block; padding:7px 16px; border-radius:3px; color:#fff; font-weight:700; font-size:12px; letter-spacing:.16em; text-transform:uppercase; }
  .champ-badge { padding:6px 13px; border-radius:3px; color:#fff; font-weight:700; font-size:11px; letter-spacing:.12em; }
  .logline { font-size:18px; line-height:1.55; color:#f3f3f3; margin:0 0 30px; padding-left:18px; border-left:3px solid var(--red); }

  .key { font-size:10px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin:32px 0 12px; }
  .craft-row { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
  .craft-num { font-size:46px; font-weight:700; line-height:1; }
  .craft-den { color:var(--muted); font-size:15px; }
  .bar { margin:11px 0; }
  .bar-head { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
  .bar-name { color:#ccc; } .bar-num { color:var(--muted); }
  .bar-track { height:5px; background:#1c1c1c; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--red); }
  .bar-just { font-size:12.5px; color:var(--muted); line-height:1.6; margin:5px 0 14px; }
  .champ-item { margin-bottom:14px; }
  .champ-name { font-size:12px; color:#bbb; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
  .champ-desc { font-size:13px; color:var(--muted); line-height:1.65; }
  .body-txt { font-size:14px; color:#cfcfcf; line-height:1.75; }
  .read-flag { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#5d7a5d; margin:14px 0; }
  .divider { height:1px; background:var(--line); margin:34px 0; }

  /* read options — mirrors the portal's read bar */
  .readbar { margin:34px 0 0; padding:20px; background:var(--card); border:1px solid var(--line); border-left:3px solid var(--red); border-radius:4px; }
  .readbar h3 { margin:0 0 14px; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .btn-row { display:flex; flex-wrap:wrap; gap:10px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 20px; border-radius:3px; font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; cursor:pointer; text-decoration:none; border:1px solid var(--line); background:#161616; color:var(--txt); }
  .btn.primary { background:var(--red); border-color:var(--red); color:#fff; }
  .btn:hover { border-color:#444; } .btn.primary:hover { background:#d40000; }
  .btn:disabled { opacity:.5; cursor:default; }
  .read-err { color:#e0726a; font-size:12px; margin-top:10px; min-height:1em; }
  .preview { display:none; margin-top:16px; max-height:520px; overflow:auto; background:#000; border:1px solid var(--line); border-radius:4px; }
  .preview.open { display:block; }
  .preview canvas { display:block; margin:10px auto; max-width:100%; box-shadow:0 1px 8px rgba(0,0,0,.6); }
  .pdf-loading { color:var(--muted); text-align:center; padding:40px 0; font-size:13px; }

  /* champion + browse */
  .actions { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-top:30px; }
  .champ-btn { display:inline-flex; align-items:center; gap:7px; background:none; border:1px solid var(--red); color:#fff; padding:11px 18px; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; cursor:pointer; }
  .champ-btn:hover:not(:disabled) { background:var(--red); } .champ-btn:disabled { opacity:.6; cursor:default; }
  .champ-btn.done { background:var(--red); border-color:var(--red); }
  .champ-btn .star { color:var(--red); } .champ-btn:hover .star, .champ-btn.done .star { color:#fff; }
  .champ-msg { font-size:11px; letter-spacing:.04em; color:var(--muted); min-height:1em; }
  .champ-msg a { color:#ccc; }
  .browse { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); color:#ccc; padding:11px 18px; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; text-decoration:none; }
  .browse:hover { border-color:#fff; color:#fff; }

  .foot { margin-top:46px; padding-top:22px; border-top:1px solid var(--line); font-size:11px; letter-spacing:.06em; color:var(--muted); line-height:1.7; }
  .foot a { color:#bbb; }

  /* full-screen reader — mirrors the portal reader (script + scene navigator) */
  .reader { position:fixed; inset:0; background:#0a0a0a; z-index:100; display:none; grid-template-rows:auto 1fr; }
  .reader.open { display:grid; }
  .rd-top { display:flex; align-items:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--line); }
  .rd-back { background:none; border:1px solid var(--line); color:#ccc; padding:8px 14px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
  .rd-back:hover { border-color:#fff; color:#fff; }
  .rd-title { font-weight:700; font-size:15px; }
  .rd-badge { margin-left:auto; padding:5px 12px; border-radius:3px; color:#fff; font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
  .rd-navtoggle { background:none; border:1px solid var(--line); color:#ccc; padding:8px 12px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; display:none; }
  .rd-body { display:grid; grid-template-columns:300px 1fr; min-height:0; }
  .rd-nav { border-right:1px solid var(--line); overflow:auto; padding:8px 0; }
  .nav-h { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); padding:12px 18px 8px; }
  .nav-note { color:var(--muted); font-size:12px; padding:0 18px; }
  .nav-sc, .nav-pg { display:flex; gap:10px; width:100%; text-align:left; background:none; border:none; color:#bbb; padding:7px 18px; cursor:pointer; font-size:12.5px; line-height:1.4; border-left:2px solid transparent; }
  .nav-sc:hover, .nav-pg:hover { background:#141414; color:#fff; }
  .nav-sc.cur, .nav-pg.cur { border-left-color:var(--red); color:#fff; background:#141414; }
  .sc-pg { color:var(--muted); min-width:22px; } .sc-txt { flex:1; }
  .rd-doc { overflow:auto; padding:24px; text-align:center; }
  .rd-page { margin:0 auto 18px; background:#fff; box-shadow:0 2px 14px rgba(0,0,0,.5); }
  .rd-page canvas { display:block; width:100%; height:100%; }
  @media (max-width:820px){
    .rd-navtoggle { display:inline-block; }
    .rd-body { grid-template-columns:1fr; }
    .rd-nav { position:absolute; top:57px; bottom:0; left:0; width:84%; max-width:320px; background:#0a0a0a; z-index:5; display:none; }
    .reader.nav-open .rd-nav { display:block; }
  }
  @media (max-width:560px){ h1.title{font-size:27px;} .craft-num{font-size:38px;} }
</style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner">
    <span class="brand">INTERDEPENDENT<span class="dot">.</span></span>
    <span class="eyebrow">Screenplay Recommendation</span>
  </div></div>
  <div class="wrap"><div id="content"><div class="state">Loading recommendation…</div></div></div>

  <!-- full-screen reader -->
  <div class="reader" id="reader">
    <div class="rd-top">
      <button class="rd-back" id="rdBack">← Back</button>
      <button class="rd-navtoggle" id="rdNavToggle">Scenes</button>
      <span class="rd-title" id="rdTitle"></span>
      <span class="rd-badge" id="rdBadge"></span>
    </div>
    <div class="rd-body">
      <aside class="rd-nav" id="rdNav"></aside>
      <div class="rd-doc" id="rdDoc"></div>
    </div>
  </div>

<script src="/reader-auth.js"></script>
<script>
const API = 'https://interdependent-api.onrender.com';
const DEC = { RECOMMEND:'#16a34a', CONSIDER:'#d97706', PASS:'#dc2626' };
const CHAMP = { HIGH:'#16a34a', MEDIUM:'#d97706', LOW:'#dc2626' };
const CRAFT_NAMES = { story_architecture:'Story Architecture', character_construction:'Character Construction', scene_craft:'Scene Craft', screenplay_execution:'Screenplay Execution', dialogue_effectiveness:'Dialogue', thematic_cohesion:'Thematic Cohesion', emotional_engagement:'Emotional Engagement' };
const CHAMP_NAMES = { distinctiveness:'Distinctiveness', writers_voice:"Writer's Voice", memorability:'Memorability', genre_competence:'Genre Competence' };
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtGenre = (g) => g ? String(g).split(',').map(x => x.trim().replace(/\b\w/g, m => m.toUpperCase())).join(' · ') : '';
const num = (x) => { const n = parseFloat(String(x).replace(/,/g,'')); return isNaN(n) ? null : n; };
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let DATA = null;
const ID = new URLSearchParams(location.search).get('id');
const BY = new URLSearchParams(location.search).get('by');

function barsHtml(craft) {
  return Object.keys(CRAFT_NAMES).filter(k => craft[k]).map(k => {
    const s = num(craft[k].score); const pct = s == null ? 0 : Math.min(100, Math.max(0, s/10*100));
    const just = craft[k].rationale || craft[k].justification;
    return `<div class="bar"><div class="bar-head"><span class="bar-name">${esc(CRAFT_NAMES[k])}</span><span class="bar-num">${s ?? '—'}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>${just ? `<div class="bar-just">${esc(just)}</div>` : ''}`;
  }).join('');
}

function render(d) {
  DATA = d;
  const ev = d.evaluation || {};
  const craft = ev.craft_score || {};
  const champ = ev.championability_rating || {};
  const craftScore = num(craft.final_craft_score) ?? num(d.weightedScore);
  const champRating = (champ.final_championability_rating || '').toUpperCase();
  const metaBits = [
    d.genre ? `<span>${esc(fmtGenre(d.genre))}</span>` : '',
    d.budget ? `<span><b>${esc(d.budget)}</b> budget</span>` : '',
    d.pageCount ? `<span><b>${d.pageCount}</b> pages</span>` : '',
  ].filter(Boolean).join('');
  const champItems = Object.keys(CHAMP_NAMES).filter(k => champ[k]).map(k =>
    `<div class="champ-item"><div class="champ-name">${esc(CHAMP_NAMES[k])}</div><div class="champ-desc">${esc(champ[k].description || champ[k].rationale || '')}</div></div>`).join('');

  const readActions = d.pdfUrl ? `
    <div class="readbar">
      <h3>Read the screenplay</h3>
      <div class="btn-row">
        <button class="btn primary" id="aReader">⊞ Open reader</button>
        <button class="btn" id="aPreview">◉ Quick preview</button>
        <a class="btn" href="${esc(d.pdfUrl)}" target="_blank" rel="noopener">↗ New tab</a>
        <a class="btn" href="${esc(d.pdfUrl)}" download>⤓ Download</a>
      </div>
      <div class="read-err" id="readErr"></div>
      <div class="preview" id="preview"></div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    ${BY ? `<div class="recby">Recommended to you by <b>${esc(BY)}</b></div>` : ''}
    <div class="accent"></div>
    <h1 class="title">${esc(d.title || 'Untitled')}</h1>
    ${metaBits ? `<div class="meta">${metaBits}</div>` : ''}
    <div class="verdict">
      ${d.decision ? `<span class="badge" style="background:${DEC[d.decision]||'#444'}">${esc(d.decision)}</span>` : ''}
      ${champRating ? `<span class="champ-badge" style="background:${CHAMP[champRating]||'#444'}">Championability: ${esc(champRating)}</span>` : ''}
    </div>
    ${d.logline ? `<p class="logline">${esc(d.logline)}</p>` : ''}
    ${readActions}
    <div class="actions">
      <button class="champ-btn" id="champBtn" title="Champion this screenplay"><span class="star">★</span><span class="champ-text">Champion</span></button>
      <a class="browse" href="/submissions.html">▦ Browse all scripts</a>
      <span class="champ-msg" id="champMsg"></span>
    </div>
    ${craftScore != null ? `<div class="key">Craft Score</div>
      <div class="craft-row"><span class="craft-num">${craftScore.toFixed(1)}</span><span class="craft-den">/ 100</span></div>
      ${d.readVerified === true ? `<div class="read-flag">✓ Full read verified</div>` : ''}` : ''}
    ${Object.keys(craft).some(k => CRAFT_NAMES[k]) ? `<div class="key">Score Breakdown</div>${barsHtml(craft)}` : ''}
    ${craft.craft_justification ? `<div class="key">Assessment</div><div class="body-txt">${esc(craft.craft_justification)}</div>` : ''}
    ${champItems ? `<div class="divider"></div><div class="key">Championability</div>${champItems}${champ.championability_justification ? `<div class="body-txt" style="margin-top:10px">${esc(champ.championability_justification)}</div>` : ''}` : ''}
    <div class="foot">Evaluated by <a href="https://www.interdependent.studio" target="_blank" rel="noopener">INTERDEPENDENT</a>. To browse the full slate you'll need the access passcode${BY ? `, which ${esc(BY)} can share with you` : ''}. Please keep the screenplay confidential.</div>`;

  document.title = `${d.title || 'Screenplay'} — INTERDEPENDENT`;
  wireReadActions(d);
  wireChampion(d);
}

// ── read options ──────────────────────────────────────────────────────────────
function wireReadActions(d) {
  if (!d.pdfUrl) return;
  const fail = (m) => { const e = document.getElementById('readErr'); if (e) e.textContent = m || ''; };
  document.getElementById('aReader').addEventListener('click', () => openReader(d));
  const pv = document.getElementById('preview');
  document.getElementById('aPreview').addEventListener('click', async () => {
    if (pv.classList.contains('open')) { pv.classList.remove('open'); pv.innerHTML = ''; return; }
    pv.classList.add('open'); pv.innerHTML = '<div class="pdf-loading">Loading —</div>';
    try { await renderPdfScroll(pv, d.pdfUrl, 560, 6); }
    catch { pv.classList.remove('open'); fail('Could not load preview'); }
  });
}

// Render up to `limit` pages into a scrollable container (used for Quick preview).
async function renderPdfScroll(container, url, maxW, limit) {
  if (!window.pdfjsLib) throw new Error('pdf');
  const pdf = await pdfjsLib.getDocument(url).promise;
  container.innerHTML = '';
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const pages = limit ? Math.min(limit, pdf.numPages) : pdf.numPages;
  for (let n = 1; n <= pages; n++) {
    const page = await pdf.getPage(n);
    const base = page.getViewport({ scale: 1 });
    const scale = Math.min(maxW, base.width) / base.width;
    const vp = page.getViewport({ scale });
    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width * dpr); c.height = Math.floor(vp.height * dpr);
    c.style.width = vp.width + 'px';
    container.appendChild(c);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp, transform: dpr !== 1 ? [dpr,0,0,dpr,0,0] : undefined }).promise;
  }
}

// ── full-screen reader (lazy render + scene navigator) ─────────────────────────
const READER_MAXW = 1100;
let _io = null, _scrollFn = null, _token = 0;
function teardownReader() {
  _token++;
  if (_io) { _io.disconnect(); _io = null; }
  const doc = document.getElementById('rdDoc');
  if (_scrollFn) { doc.removeEventListener('scroll', _scrollFn); _scrollFn = null; }
  doc.innerHTML = ''; document.getElementById('rdNav').innerHTML = '';
}
function openReader(d) {
  const ev = d.evaluation || {};
  document.getElementById('rdTitle').textContent = d.title || '—';
  const b = document.getElementById('rdBadge');
  if (d.decision) { b.textContent = d.decision; b.style.background = DEC[d.decision] || '#444'; b.style.display = ''; } else b.style.display = 'none';
  document.getElementById('reader').classList.add('open');
  document.getElementById('reader').classList.remove('nav-open');
  document.getElementById('rdDoc').innerHTML = '<div class="pdf-loading">Loading screenplay —</div>';
  renderReaderPdf(d.pdfUrl).catch(() => { document.getElementById('rdDoc').innerHTML = '<div class="pdf-loading">Could not load — use Download or New tab.</div>'; });
}
function closeReader() { document.getElementById('reader').classList.remove('open'); teardownReader(); }
document.getElementById('rdBack').addEventListener('click', closeReader);
document.getElementById('rdNavToggle').addEventListener('click', () => document.getElementById('reader').classList.toggle('nav-open'));
const closeNavCompact = () => { if (window.matchMedia('(max-width:820px)').matches) document.getElementById('reader').classList.remove('nav-open'); };

async function renderReaderPdf(url) {
  const doc = document.getElementById('rdDoc');
  teardownReader(); const token = _token;
  if (!window.pdfjsLib) { doc.innerHTML = '<div class="pdf-loading">PDF viewer failed to load.</div>'; return; }
  let pdf;
  try { pdf = await pdfjsLib.getDocument(url).promise; } catch { doc.innerHTML = '<div class="pdf-loading">Could not load the screenplay.</div>'; return; }
  if (token !== _token) return;
  doc.innerHTML = '';
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const page1 = await pdf.getPage(1);
  const base = page1.getViewport({ scale: 1 });
  const cw = Math.max(280, Math.min(READER_MAXW, doc.clientWidth - 52));
  const scale = cw / base.width;
  const ph = base.height * scale;
  const slots = [];
  for (let n = 1; n <= pdf.numPages; n++) {
    const slot = document.createElement('div');
    slot.className = 'rd-page'; slot.style.width = cw + 'px'; slot.style.height = ph + 'px'; slot.dataset.page = n;
    doc.appendChild(slot); slots.push(slot);
  }
  const renderSlot = async (slot) => {
    if (slot.dataset.done) return; slot.dataset.done = '1';
    try {
      const page = await pdf.getPage(+slot.dataset.page);
      const vp = page.getViewport({ scale });
      const c = document.createElement('canvas');
      c.width = Math.floor(vp.width * dpr); c.height = Math.floor(vp.height * dpr);
      slot.appendChild(c);
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp, transform: dpr !== 1 ? [dpr,0,0,dpr,0,0] : undefined }).promise;
    } catch { slot.dataset.done = ''; }
  };
  _io = new IntersectionObserver((entries) => {
    for (const e of entries) { if (e.isIntersecting) renderSlot(e.target); else { const c = e.target.querySelector('canvas'); if (c) { c.remove(); e.target.dataset.done = ''; } } }
  }, { root: doc, rootMargin: '1200px 0px' });
  slots.forEach(s => _io.observe(s));
  buildSceneNav(pdf, base, scale, slots, token);
}

function installNavHighlight(targets) {
  const doc = document.getElementById('rdDoc'); const nav = document.getElementById('rdNav');
  let cur = -1;
  _scrollFn = () => {
    const at = doc.scrollTop + 64; let i = 0;
    for (let k = 0; k < targets.length; k++) { if (targets[k].scrollY <= at) i = k; else break; }
    if (i === cur) return;
    if (targets[cur]) targets[cur].btn.classList.remove('cur');
    const t = targets[i];
    if (t) { t.btn.classList.add('cur'); const top = t.btn.offsetTop, bot = top + t.btn.offsetHeight; if (top < nav.scrollTop || bot > nav.scrollTop + nav.clientHeight) nav.scrollTop = top - nav.clientHeight/2; }
    cur = i;
  };
  doc.addEventListener('scroll', _scrollFn, { passive: true }); _scrollFn();
}
function buildPageNav(numPages, slots) {
  const doc = document.getElementById('rdDoc'); const nav = document.getElementById('rdNav');
  nav.innerHTML = `<div class="nav-h">${numPages} Pages</div>` + Array.from({ length: numPages }, (_, i) => `<button class="nav-pg" data-pg="${i}"><b>${i+1}</b></button>`).join('');
  const btns = [...nav.querySelectorAll('.nav-pg')];
  btns.forEach((b, i) => b.addEventListener('click', () => { doc.scrollTop += slots[i].getBoundingClientRect().top - doc.getBoundingClientRect().top - 12; closeNavCompact(); }));
  const origin = doc.getBoundingClientRect().top - doc.scrollTop;
  installNavHighlight(slots.map((s, i) => ({ btn: btns[i], scrollY: s.getBoundingClientRect().top - origin })));
}
async function buildSceneNav(pdf, base, scale, slots, token) {
  const doc = document.getElementById('rdDoc'); const nav = document.getElementById('rdNav');
  nav.innerHTML = `<div class="nav-h">Scenes</div><div class="nav-note">Scanning —</div>`;
  const SLUG = /^(INT|EXT|EST|I\/E|INT\.?\/EXT\.?)[.\s]/i;
  const ph18 = base.height * scale + 18; const scenes = []; const CHUNK = 8;
  try {
    for (let start = 1; start <= pdf.numPages; start += CHUNK) {
      const pages = [];
      for (let n = start; n < Math.min(start + CHUNK, pdf.numPages + 1); n++) pages.push(n);
      const chunk = await Promise.all(pages.map(async (n) => {
        const page = await pdf.getPage(n); const content = await page.getTextContent(); const lines = {};
        for (const it of content.items) { if (!it.str || !it.str.trim()) continue; const y = Math.round(it.transform[5]); (lines[y] = lines[y] || []).push(it); }
        const found = [];
        for (const yk of Object.keys(lines)) {
          const items = lines[yk].sort((a, b) => a.transform[4] - b.transform[4]);
          let text = '', prevEnd = null;
          for (const it of items) { const x = it.transform[4]; if (prevEnd !== null && x - prevEnd > 2) text += ' '; text += it.str; prevEnd = x + (it.width || 0); }
          text = text.replace(/\s+/g, ' ').trim();
          const norm = text.replace(/^\s*\d{1,3}[A-Z]?[.\)]?\s+/, '').replace(/\s+\d{1,3}[A-Z]?\.?$/, '');
          if (SLUG.test(norm) && norm.length <= 90) found.push({ page: n, y: Number(yk), text: norm, inPageY: (base.height - Number(yk)) * scale });
        }
        found.sort((a, b) => b.y - a.y); return found;
      }));
      if (token !== _token) return;
      chunk.forEach(f => scenes.push(...f));
    }
  } catch { /* use what we have */ }
  if (token !== _token) return;
  if (!scenes.length) { buildPageNav(pdf.numPages, slots); return; }
  scenes.forEach(s => { s.scrollY = 28 + (s.page - 1) * ph18 + s.inPageY; });
  nav.innerHTML = `<div class="nav-h">${scenes.length} Scenes</div>` + scenes.map((s, i) => `<button class="nav-sc" data-i="${i}"><span class="sc-pg">${s.page}</span><span class="sc-txt">${esc(s.text)}</span></button>`).join('');
  const btns = [...nav.querySelectorAll('.nav-sc')];
  btns.forEach((b, i) => b.addEventListener('click', () => { doc.scrollTop = Math.max(0, scenes[i].scrollY - 16); closeNavCompact(); }));
  installNavHighlight(scenes.map((s, i) => ({ scrollY: s.scrollY, btn: btns[i] })));
}

// ── champion (same passkey flow as the portal) ────────────────────────────────
function wireChampion(d) {
  const btn = document.getElementById('champBtn'); const msg = document.getElementById('champMsg');
  if (!btn) return;
  if (!window.ReaderAuth) { btn.disabled = true; btn.title = 'Passkeys unavailable'; return; }
  ReaderAuth.checkSupport().then(ok => { if (!ok) { btn.disabled = true; msg.textContent = ReaderAuth.UNSUPPORTED_MESSAGE; } });
  btn.addEventListener('click', () => championScript(d, btn, msg));
}
async function championScript(d, btn, msg) {
  const txt = btn.querySelector('.champ-text'); const set = (s) => txt.textContent = s; msg.textContent = '';
  if (!(await ReaderAuth.checkSupport())) { msg.textContent = ReaderAuth.UNSUPPORTED_MESSAGE; return; }
  btn.disabled = true; set('Verifying');
  try { await ReaderAuth.signInOrRegister(); }
  catch (e) {
    btn.disabled = false; set('Champion');
    if (e && e.code === 'passkey_cancelled') {
      msg.innerHTML = 'Dismissed — <a href="#" id="cr">try again</a>';
      const r = msg.querySelector('#cr'); if (r) r.addEventListener('click', ev => { ev.preventDefault(); championScript(d, btn, msg); });
    } else msg.textContent = (e && e.message) || 'Could not verify';
    return;
  }
  const reader = ReaderAuth.getReader();
  if (!reader || !reader.handle) { btn.disabled = false; set('Champion'); msg.textContent = 'Could not identify reader'; return; }
  set('Adding');
  try {
    const res = await ReaderAuth.authedWrite(`/leaderboard/${encodeURIComponent(reader.handle)}/scripts`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ scriptId: ID }) });
    if (res.ok || res.status === 409) {
      set(res.status === 409 ? 'Already added' : 'Championed'); btn.classList.add('done');
      const star = btn.querySelector('.star'); if (star) star.textContent = '✓';
      msg.innerHTML = `<a href="/leaderboard.html?h=${encodeURIComponent(reader.handle)}">View leaderboard →</a>`; return;
    }
    btn.disabled = false; set('Champion');
    if (res.status === 401) msg.textContent = 'Verification expired — try again';
    else { const b = await res.json().catch(() => ({})); msg.textContent = b.error || `Could not add (${res.status})`; }
  } catch (e) { btn.disabled = false; set('Champion'); if (!(e && e.code === 'passkey_cancelled')) msg.textContent = (e && e.message) || 'Could not add'; }
}

// ── load ──────────────────────────────────────────────────────────────────────
(async () => {
  const el = document.getElementById('content');
  if (!ID) { el.innerHTML = '<div class="state">No recommendation specified.</div>'; return; }
  try {
    const res = await fetch(`${API}/share/${encodeURIComponent(ID)}`);
    if (res.status === 404) { el.innerHTML = '<div class="state">This recommendation isn’t available.</div>'; return; }
    if (!res.ok) throw new Error('load');
    render(await res.json());
  } catch { el.innerHTML = '<div class="state">Couldn’t load this recommendation — please try again.</div>'; }
})();
</script>
