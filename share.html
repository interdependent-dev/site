<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenplay Recommendation — INTERDEPENDENT</title>
<meta name="robots" content="noindex">
<style>body{margin:0;background:#0a0a0a;color:#888;font-family:'Helvetica Neue',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;letter-spacing:.06em}</style>
<script>
  // Recommendations now live inside the portal itself (same UI, with a sticky
  // "Recommended to you" banner). Forward old share links to that experience.
  (function () {
    const q = new URLSearchParams(location.search);
    const id = q.get('id'); const by = q.get('by');
    const u = new URL('/submissions.html', location.origin);
    if (id) u.searchParams.set('rec', id);
    if (by) u.searchParams.set('by', by);
    location.replace(u.toString());
  })();
</script>
</head>
<body>Opening recommendation…</body>
</html>
