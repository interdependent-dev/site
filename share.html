<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenplay Recommendation — INTERDEPENDENT</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="A screenplay recommendation from INTERDEPENDENT">
<meta property="og:description" content="An evaluated screenplay, recommended for your consideration.">
<style>
  :root { --red:#ff0000; --bg:#0a0a0a; --card:#101010; --line:#222; --muted:#888; --txt:#e8e8e8; }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--txt);
    font-family:'Helvetica Neue',Arial,sans-serif; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:760px; margin:0 auto; padding:0 22px 80px; }
  .topbar { border-bottom:1px solid var(--line); margin-bottom:36px; }
  .topbar-inner { max-width:760px; margin:0 auto; padding:20px 22px; display:flex; align-items:center; gap:10px; }
  .brand { font-size:13px; letter-spacing:.34em; text-transform:uppercase; font-weight:700; }
  .brand .dot { color:var(--red); }
  .eyebrow { font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-left:auto; }

  .state { text-align:center; color:var(--muted); padding:80px 0; font-size:14px; letter-spacing:.04em; }

  .accent { width:42px; height:4px; background:var(--red); margin-bottom:18px; }
  h1.title { font-size:34px; line-height:1.12; margin:0 0 14px; font-weight:700; letter-spacing:-.01em; }
  .meta { display:flex; flex-wrap:wrap; gap:8px 22px; color:var(--muted); font-size:12px;
          letter-spacing:.12em; text-transform:uppercase; margin-bottom:26px; }
  .meta b { color:var(--txt); font-weight:600; }

  .verdict { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:26px; }
  .badge { display:inline-block; padding:7px 16px; border-radius:3px; color:#fff; font-weight:700;
           font-size:12px; letter-spacing:.16em; text-transform:uppercase; }
  .champ-badge { padding:6px 13px; border-radius:3px; color:#fff; font-weight:700; font-size:11px; letter-spacing:.12em; }

  .logline { font-size:18px; line-height:1.55; color:#f3f3f3; margin:0 0 34px;
             padding-left:18px; border-left:3px solid var(--red); }

  .key { font-size:10px; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; margin:34px 0 12px; }
  .craft-row { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
  .craft-num { font-size:46px; font-weight:700; line-height:1; }
  .craft-den { color:var(--muted); font-size:15px; }

  .bar { margin:11px 0; }
  .bar-head { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
  .bar-name { color:#ccc; letter-spacing:.02em; }
  .bar-num { color:var(--muted); }
  .bar-track { height:5px; background:#1c1c1c; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--red); }
  .bar-just { font-size:12.5px; color:var(--muted); line-height:1.6; margin:5px 0 14px; }

  .champ-item { margin-bottom:14px; }
  .champ-name { font-size:12px; color:#bbb; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
  .champ-desc { font-size:13px; color:var(--muted); line-height:1.65; }

  .body-txt { font-size:14px; color:#cfcfcf; line-height:1.75; }
  .read-flag { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#5d7a5d; margin:14px 0; }

  .readbar { margin:40px 0 0; padding:20px; background:var(--card); border:1px solid var(--line); border-left:3px solid var(--red); border-radius:4px; }
  .readbar h3 { margin:0 0 14px; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .btn-row { display:flex; flex-wrap:wrap; gap:10px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 20px; border-radius:3px;
         font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; cursor:pointer;
         text-decoration:none; border:1px solid var(--line); background:#161616; color:var(--txt); }
  .btn.primary { background:var(--red); border-color:var(--red); color:#fff; }
  .btn:hover { border-color:#444; }
  .btn.primary:hover { background:#d40000; }

  .foot { margin-top:48px; padding-top:22px; border-top:1px solid var(--line);
          font-size:11px; letter-spacing:.06em; color:var(--muted); line-height:1.7; }
  .foot a { color:#bbb; text-decoration:none; }
  .divider { height:1px; background:var(--line); margin:36px 0; }
  @media (max-width:560px){ h1.title{font-size:27px;} .craft-num{font-size:38px;} }
</style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner">
    <span class="brand">INTERDEPENDENT<span class="dot">.</span></span>
    <span class="eyebrow">Screenplay Recommendation</span>
  </div></div>
  <div class="wrap">
    <div id="content"><div class="state">Loading recommendation…</div></div>
  </div>

<script>
const API = 'https://interdependent-api.onrender.com';
const DEC = { RECOMMEND:'#16a34a', CONSIDER:'#d97706', PASS:'#dc2626' };
const CHAMP = { HIGH:'#16a34a', MEDIUM:'#d97706', LOW:'#dc2626' };
const CRAFT_NAMES = { story_architecture:'Story Architecture', character_construction:'Character Construction',
  scene_craft:'Scene Craft', screenplay_execution:'Screenplay Execution', dialogue_effectiveness:'Dialogue',
  thematic_cohesion:'Thematic Cohesion', emotional_engagement:'Emotional Engagement' };
const CHAMP_NAMES = { distinctiveness:'Distinctiveness', writers_voice:"Writer's Voice",
  memorability:'Memorability', genre_competence:'Genre Competence' };

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtGenre = (g) => g ? String(g).split(',').map(x => x.trim().replace(/\b\w/g, m => m.toUpperCase())).join(' · ') : '';
const num = (x) => { const n = parseFloat(String(x).replace(/,/g,'')); return isNaN(n) ? null : n; };

function barsHtml(craft) {
  return Object.keys(CRAFT_NAMES).filter(k => craft[k]).map(k => {
    const s = num(craft[k].score); const pct = s == null ? 0 : Math.min(100, Math.max(0, s/10*100));
    const just = craft[k].rationale || craft[k].justification;
    return `<div class="bar"><div class="bar-head"><span class="bar-name">${esc(CRAFT_NAMES[k])}</span><span class="bar-num">${s ?? '—'}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>
      ${just ? `<div class="bar-just">${esc(just)}</div>` : ''}`;
  }).join('');
}

function render(d) {
  const ev = d.evaluation || {};
  const craft = ev.craft_score || {};
  const champ = ev.championability_rating || {};
  const craftScore = num(craft.final_craft_score) ?? num(d.weightedScore);
  const champRating = (champ.final_championability_rating || '').toUpperCase();
  const decColor = DEC[d.decision] || '#444';

  const metaBits = [
    d.genre ? `<span>${esc(fmtGenre(d.genre))}</span>` : '',
    d.budget ? `<span><b>${esc(d.budget)}</b> budget</span>` : '',
    d.pageCount ? `<span><b>${d.pageCount}</b> pages</span>` : '',
  ].filter(Boolean).join('');

  const champItems = Object.keys(CHAMP_NAMES).filter(k => champ[k]).map(k =>
    `<div class="champ-item"><div class="champ-name">${esc(CHAMP_NAMES[k])}</div>
     <div class="champ-desc">${esc(champ[k].description || champ[k].rationale || '')}</div></div>`).join('');

  const readActions = d.pdfUrl ? `
    <div class="readbar">
      <h3>Read the screenplay</h3>
      <div class="btn-row">
        <a class="btn primary" href="${esc(d.pdfUrl)}" target="_blank" rel="noopener">Open PDF ↗</a>
        <a class="btn" href="${esc(d.pdfUrl)}" download>Download</a>
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="accent"></div>
    <h1 class="title">${esc(d.title || 'Untitled')}</h1>
    ${metaBits ? `<div class="meta">${metaBits}</div>` : ''}
    <div class="verdict">
      ${d.decision ? `<span class="badge" style="background:${decColor}">${esc(d.decision)}</span>` : ''}
      ${champRating ? `<span class="champ-badge" style="background:${CHAMP[champRating]||'#444'}">Championability: ${esc(champRating)}</span>` : ''}
    </div>
    ${d.logline ? `<p class="logline">${esc(d.logline)}</p>` : ''}
    ${readActions}
    ${craftScore != null ? `<div class="key">Craft Score</div>
      <div class="craft-row"><span class="craft-num">${craftScore.toFixed(1)}</span><span class="craft-den">/ 100</span></div>
      ${d.readVerified === true ? `<div class="read-flag">✓ Full read verified</div>` : ''}` : ''}
    ${Object.keys(craft).some(k => CRAFT_NAMES[k]) ? `<div class="key">Score Breakdown</div>${barsHtml(craft)}` : ''}
    ${craft.craft_justification ? `<div class="key">Assessment</div><div class="body-txt">${esc(craft.craft_justification)}</div>` : ''}
    ${champItems ? `<div class="divider"></div><div class="key">Championability</div>${champItems}
      ${champ.championability_justification ? `<div class="body-txt" style="margin-top:10px">${esc(champ.championability_justification)}</div>` : ''}` : ''}
    <div class="foot">
      Evaluated by <a href="https://www.interdependent.studio" target="_blank" rel="noopener">INTERDEPENDENT</a>.
      This is an internal recommendation shared with you directly; please keep the screenplay confidential.
    </div>`;
  document.title = `${d.title || 'Screenplay'} — INTERDEPENDENT`;
}

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  const el = document.getElementById('content');
  if (!id) { el.innerHTML = '<div class="state">No recommendation specified.</div>'; return; }
  try {
    const res = await fetch(`${API}/share/${encodeURIComponent(id)}`);
    if (res.status === 404) { el.innerHTML = '<div class="state">This recommendation isn’t available.</div>'; return; }
    if (!res.ok) throw new Error('load');
    render(await res.json());
  } catch {
    el.innerHTML = '<div class="state">Couldn’t load this recommendation — please try again.</div>';
  }
})();
</script>
</body>
</html>
